<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="500" height="440">
  <defs>
    <!-- Figure gradients -->
    <radialGradient id="blueGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
    <radialGradient id="purpleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9575CD"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </radialGradient>
    <radialGradient id="orangeGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </radialGradient>

    <!-- Circle background gradient -->
    <radialGradient id="circleGrad" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#8B6FD4"/>
      <stop offset="45%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#1A4FA0"/>
    </radialGradient>

    <!-- Right figure green body patch -->
    <radialGradient id="greenGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>

    <!-- Golden glow ring gradient -->
    <radialGradient id="glowRing" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFF0AA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>

    <!-- Text: Friend -->
    <linearGradient id="friendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>

    <!-- Text: Ping -->
    <linearGradient id="pingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="40%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sparkle filter -->
    <filter id="sparkleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for figures -->
    <filter id="figureShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Clip to main circle -->
    <clipPath id="circleClip">
      <circle cx="250" cy="190" r="112"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="500" height="440" fill="#000"/>

  <!-- ===== HUMAN FIGURES ===== -->

  <!-- Blue figure (left, behind circle) -->
  <g filter="url(#figureShadow)">
    <!-- Head -->
    <circle cx="185" cy="122" r="34" fill="url(#blueGrad)"/>
    <!-- Neck + shoulders/body (upper torso) -->
    <ellipse cx="185" cy="167" rx="36" ry="26" fill="url(#blueGrad)"/>
    <rect x="149" y="162" width="72" height="40" rx="12" fill="url(#blueGrad)"/>
  </g>

  <!-- Orange figure (right, behind circle) -->
  <g filter="url(#figureShadow)">
    <!-- Head -->
    <circle cx="315" cy="122" r="34" fill="url(#orangeGrad)"/>
    <!-- Body -->
    <ellipse cx="315" cy="167" rx="36" ry="26" fill="url(#orangeGrad)"/>
    <rect x="279" y="162" width="72" height="40" rx="12" fill="url(#orangeGrad)"/>
    <!-- Green lower body (visible bottom-right of the circle) -->
    <rect x="279" y="185" width="72" height="30" rx="8" fill="url(#greenGrad)"/>
  </g>

  <!-- Purple/violet center figure (tallest, partially behind circle) -->
  <g filter="url(#figureShadow)">
    <!-- Head (above circle) -->
    <circle cx="250" cy="97" r="40" fill="url(#purpleGrad)"/>
    <!-- Neck + shoulders -->
    <ellipse cx="250" cy="145" rx="42" ry="30" fill="url(#purpleGrad)"/>
    <rect x="208" y="140" width="84" height="55" rx="14" fill="url(#purpleGrad)"/>
  </g>

  <!-- ===== GLOWING AURA RING ===== -->
  <circle cx="250" cy="190" r="138" fill="url(#glowRing)" opacity="0.7"/>
  <circle cx="250" cy="190" r="128" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.35" filter="url(#glow)"/>
  <circle cx="250" cy="190" r="124" fill="none" stroke="#FFFDE7" stroke-width="1.5" opacity="0.55"/>
  <!-- Extra bottom glow arc -->
  <path d="M 128,215 Q 145,270 195,292 Q 250,310 305,292 Q 355,270 372,215"
        fill="none" stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>

  <!-- ===== BLACK BORDER RING ===== -->
  <circle cx="250" cy="190" r="120" fill="#000" stroke="#111" stroke-width="2"/>

  <!-- ===== MAIN CIRCLE (CLOCK ICON) ===== -->
  <circle cx="250" cy="190" r="114" fill="url(#circleGrad)"/>

  <!-- Pie segments (clipped to circle) -->
  <g clip-path="url(#circleClip)">
    <!-- Yellow-gold sector: top quarter (270° to 360° = top to right) -->
    <!-- 270° point = (250, 190-112) = (250, 78) -->
    <!-- 360°/0° point = (250+112, 190) = (362, 190) -->
    <path d="M 250,190 L 250,78 A 112,112 0 0,1 362,190 Z" fill="#FFC107"/>

    <!-- Add a sharper golden triangle overlay at top (the "play/clock hand" shape) -->
    <polygon points="250,190 310,108 250,78" fill="#FFD600"/>

    <!-- Yellow-green transition sector: 0° to ~70° -->
    <!-- 70° point = (250+112*cos(70°), 190+112*sin(70°)) = (250+38.3, 190+105.2) = (288.3, 295.2) -->
    <path d="M 250,190 L 362,190 A 112,112 0 0,1 288,295 Z" fill="#8BC34A"/>

    <!-- Green sector: ~70° to ~105° -->
    <!-- 105° point = (250+112*cos(105°), 190+112*sin(105°)) = (250-29, 190+108.2) = (221, 298.2) -->
    <path d="M 250,190 L 288,295 A 112,112 0 0,1 221,298 Z" fill="#4CAF50"/>
  </g>

  <!-- Black outer ring overlay (border) -->
  <circle cx="250" cy="190" r="116" fill="none" stroke="#000" stroke-width="12"/>
  <circle cx="250" cy="190" r="110" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ===== PHONE ICON (white, centered in circle) ===== -->
  <!-- Using standard material phone path, scaled ~4x, centered at 250,190 -->
  <g transform="translate(197, 137) scale(4.4)" fill="white">
    <path d="M 6.62,10.79 C 8.06,13.62 10.38,15.94 13.21,17.38 L 15.41,15.18
             C 15.69,14.90 16.08,14.82 16.43,14.93 C 17.55,15.30 18.75,15.50 20,15.50
             C 20.55,15.50 21,15.95 21,16.50 L 21,20 C 21,20.55 20.55,21 20,21
             C 10.61,21 3,13.39 3,4 C 3,3.45 3.45,3 4,3 L 7.5,3
             C 8.05,3 8.5,3.45 8.5,4 C 8.5,5.25 8.70,6.45 9.07,7.57
             C 9.18,7.92 9.10,8.31 8.82,8.59 Z"/>
  </g>

  <!-- ===== SPARKLES ===== -->
  <!-- Top-left -->
  <g transform="translate(148, 152)" filter="url(#sparkleGlow)">
    <path d="M0,-16 L2,-2 L16,0 L2,2 L0,16 L-2,2 L-16,0 L-2,-2 Z" fill="white" opacity="0.95"/>
    <path d="M0,-9 L1,-1 L9,0 L1,1 L0,9 L-1,1 L-9,0 L-1,-1 Z" fill="white"/>
  </g>
  <!-- Right side -->
  <g transform="translate(386, 178)" filter="url(#sparkleGlow)">
    <path d="M0,-13 L1.6,-1.6 L13,0 L1.6,1.6 L0,13 L-1.6,1.6 L-13,0 L-1.6,-1.6 Z" fill="white" opacity="0.85"/>
  </g>
  <!-- Bottom-left -->
  <g transform="translate(160, 265)" filter="url(#sparkleGlow)">
    <path d="M0,-11 L1.3,-1.3 L11,0 L1.3,1.3 L0,11 L-1.3,1.3 L-11,0 L-1.3,-1.3 Z" fill="white" opacity="0.7"/>
  </g>
  <!-- Bottom-right gold sparkle -->
  <g transform="translate(358, 260)" filter="url(#sparkleGlow)">
    <path d="M0,-18 L2.2,-2.2 L18,0 L2.2,2.2 L0,18 L-2.2,2.2 L-18,0 L-2.2,-2.2 Z" fill="#FFD700" opacity="0.95"/>
    <path d="M0,-10 L1.2,-1.2 L10,0 L1.2,1.2 L0,10 L-1.2,1.2 L-10,0 L-1.2,-1.2 Z" fill="#FFF8DC"/>
  </g>
  <!-- Small top-right sparkle -->
  <g transform="translate(345, 105)" filter="url(#sparkleGlow)">
    <path d="M0,-9 L1,-1 L9,0 L1,1 L0,9 L-1,1 L-9,0 L-1,-1 Z" fill="white" opacity="0.65"/>
  </g>

  <!-- ===== TEXT "FriendPing" ===== -->
  <!-- "Friend" - ends at center x=250 -->
  <text
    x="248"
    y="370"
    text-anchor="end"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-weight="900"
    font-size="72"
    fill="url(#friendGrad)"
    letter-spacing="-1">Friend</text>

  <!-- "Ping" - starts at center x=252 -->
  <text
    x="252"
    y="370"
    text-anchor="start"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-weight="900"
    font-size="72"
    fill="url(#pingGrad)"
    letter-spacing="-1">Ping</text>

  <!-- Golden swoosh underline -->
  <path d="M 185,384 Q 250,402 315,384"
        fill="none" stroke="#FF8C00" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 192,391 Q 250,408 308,391"
        fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
